name: Run job agent (on-demand poll)

on:
  schedule:
    # GitHub's minimum schedule granularity is 5 minutes, and actual runs can be
    # delayed further during high load — this is "near real-time," not instant.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-run
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_pending: ${{ steps.check.outputs.has_pending }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cheap path: just a single Supabase query, no Playwright install. This runs
      # every 5 minutes, so keeping it fast matters even though it's free on a public repo.
      - name: Install minimal dependencies
        working-directory: agent
        run: pip install supabase python-dotenv

      - name: Check for pending run requests
        id: check
        working-directory: agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python check_pending.py >> "$GITHUB_OUTPUT"

  run-agent:
    needs: check
    if: needs.check.outputs.has_pending == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        working-directory: agent
        run: playwright install --with-deps chromium

      - name: Run agent
        working-directory: agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python poll_requests.py
